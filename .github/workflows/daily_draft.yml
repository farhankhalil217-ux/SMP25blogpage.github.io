name: Daily AI Content Drafter

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  draft_article:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ADD THIS MISSING STEP:
      - name: Install Dependencies
        run: |
          pip install google-genai google-api-python-client youtube-transcript-api

      - name: Run Fetcher Script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python fetcher.py

      - name: Commit and Push Draft
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # This command adds ONLY if the folder exists, avoiding the 128 error
          [ -d "drafts" ] && git add drafts/*.md
          [ -f "processed_videos.txt" ] && git add processed_videos.txt
          
          if ! git diff --staged --quiet; then
            git commit -m "Auto-drafted new SOLAR blog post [skip ci]"
            git pull origin main --no-rebase --strategy-option=union
            git push origin main
          else
            echo "No new drafts to push today. Skipping commit."
          fi
